ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    transform_time_offset: 0.03 # TF发布允许延迟
    sensor_timeout: 0.08   # = 2 × IMU周期(40ms)；允许1个包缺失不误报
    two_d_mode: true

    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    publish_tf: true         # EKF publishes odom→base_footprint TF (diff_cont has enable_odom_tf: false)
    print_diagnostics: true

    # Source 1: wheel encoder odometry via diff_drive_controller
    # Only use vx (linear velocity) — let IMU handle heading
    odom0: /odom
    odom0_config: [false, false, false,  # x y z      (EKF integrates position)
                   false, false, false,  # roll pitch yaw
                   true,  false, false,  # vx vy vz   ← encoder linear velocity
                   false, false, false,  # angular velocity (delegated to IMU)
                   false, false, false]  # acceleration
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 5

    # Source 2: STM32 INS heading (published via /imu)
    # angular_velocity.z comes from encoder kinematics (same source as odom0) — NOT used
    # orientation.yaw comes from STM32 internal INS (QMB658C fused) — independent, IS used
    imu0: /imu
    imu0_config: [false, false, false,  # x y z
                  false, false, true,   # roll pitch yaw ← INS absolute heading (independent)
                  false, false, false,  # linear velocity
                  false, false, false,  # angular velocity z ← encoder-derived, redundant with odom0
                  false, false, false]  # acceleration
    imu0_differential: true
    imu0_relative: false
    imu0_queue_size: 5
    imu0_remove_gravitational_acceleration: true
