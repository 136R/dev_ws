imu_complementary_filter:
  ros__parameters:
    use_mag: false
    publish_tf: false
    fixed_frame: odom
    do_bias_estimation: true   # online gyro bias estimation, compensates residual drift
    do_adaptive_gain: true
    gain_acc: 0.01             # accelerometer correction weight for roll/pitch
    gain_mag: 0.01             # unused (use_mag: false), kept for reference
